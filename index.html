<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CINEFLIX UNIVERSE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');

:root {
  --bg: #070709;
  --gold: #c9a84c;
  --gold2: #f0d080;
  --red: #e63946;
  --text: #f0ece4;
  --muted: #6b6560;
  --surface: #111018;
  --border: rgba(201,168,76,0.15);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  width:100%; height:100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
}

.bg-cinema {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 120% 60% at 50% 0%, rgba(201,168,76,0.07) 0%, transparent 55%),
    radial-gradient(ellipse 80% 40% at 100% 100%, rgba(230,57,70,0.05) 0%, transparent 50%),
    repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255,255,255,0.012) 60px, rgba(255,255,255,0.012) 61px);
}

.grain {
  position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.35;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

.app {
  position: relative; z-index: 2;
  width: 100%; height: 100vh;
  display: flex; flex-direction: column;
}

.header {
  flex-shrink: 0;
  padding: 14px 18px 10px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(7,7,9,0.97) 0%, rgba(7,7,9,0.6) 100%);
  backdrop-filter: blur(12px);
}

.brand { display: flex; align-items: center; gap: 8px; flex: 1; }

.brand-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--gold), var(--red));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
  box-shadow: 0 0 16px rgba(201,168,76,0.35);
}

.brand-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px; letter-spacing: 3px;
  background: linear-gradient(90deg, var(--gold2), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  line-height: 1;
}

.brand-sub {
  font-size: 8px; letter-spacing: 3px;
  color: var(--muted); text-transform: uppercase;
  line-height: 1; margin-top: 2px;
}

.hd-badge {
  font-size: 9px; font-weight: 600; letter-spacing: 1.5px;
  color: var(--gold); border: 1px solid rgba(201,168,76,0.4);
  padding: 3px 8px; border-radius: 4px;
  background: rgba(201,168,76,0.06);
}

.video-container {
  flex: 1; position: relative;
  background: #000;
  display: flex; align-items: center; justify-content: center;
  min-height: 0;
}

#player {
  width: 100%; height: 100%;
  object-fit: contain; display: block;
}

.loading-overlay {
  position: absolute; inset: 0; background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px;
  z-index: 10; transition: opacity 0.5s;
}
.loading-overlay.hidden { opacity: 0; pointer-events: none; }

.loader-ring {
  width: 56px; height: 56px;
  border: 2px solid rgba(201,168,76,0.15);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loader-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; letter-spacing: 4px;
  background: linear-gradient(90deg, var(--gold2), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  animation: glow-pulse 2s ease-in-out infinite;
}
@keyframes glow-pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

.loader-text {
  font-size: 11px; letter-spacing: 2px;
  color: var(--muted); text-transform: uppercase;
}

.error-overlay {
  position: absolute; inset: 0; background: #000;
  display: none; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px; z-index: 10;
}
.error-overlay.show { display: flex; }
.error-icon { font-size: 44px; }
.error-title { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; color:var(--red); }
.error-msg { font-size:13px; color:var(--muted); text-align:center; padding:0 30px; line-height:1.6; }

.info-bar {
  flex-shrink: 0;
  padding: 10px 18px 14px;
  background: linear-gradient(0deg, rgba(7,7,9,0.98) 0%, rgba(7,7,9,0.7) 100%);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  min-height: 52px;
}

.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--gold); box-shadow: 0 0 8px var(--gold);
  flex-shrink: 0; animation: dot-pulse 2s ease-in-out infinite;
}
.status-dot.idle { background: var(--muted); box-shadow:none; animation:none; }
.status-dot.error-dot { background: var(--red); box-shadow: 0 0 8px var(--red); animation:none; }
@keyframes dot-pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.info-text { flex:1; min-width:0; }
.info-title {
  font-size:13px; font-weight:600; color:var(--text);
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; letter-spacing:0.3px;
}
.info-status { font-size:10px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; margin-top:2px; }

.cf-badge {
  font-size:9px; font-weight:600; letter-spacing:1px; color:var(--gold);
  background:rgba(201,168,76,0.08); border:1px solid rgba(201,168,76,0.2);
  padding:4px 10px; border-radius:20px; flex-shrink:0;
}
</style>
</head>
<body>
<div class="bg-cinema"></div>
<div class="grain"></div>

<div class="app">
  <div class="header">
    <div class="brand">
      <div class="brand-icon">🎬</div>
      <div>
        <div class="brand-name">CINEFLIX UNIVERSE</div>
        <div class="brand-sub">Stream • Anytime • Anywhere</div>
      </div>
    </div>
    <div class="hd-badge">HD</div>
  </div>

  <div class="video-container">
    <div class="loading-overlay" id="loadingState">
      <div class="loader-ring"></div>
      <div class="loader-logo">CINEFLIX</div>
      <div class="loader-text">Loading Stream...</div>
    </div>
    <div class="error-overlay" id="errorState">
      <div class="error-icon">⚠️</div>
      <div class="error-title">Stream Error</div>
      <div class="error-msg">Video load হয়নি।<br>Link টি সঠিক কিনা চেক করুন।</div>
    </div>
    <video id="player" playsinline preload="auto" controls></video>
  </div>

  <div class="info-bar">
    <div class="status-dot idle" id="statusDot"></div>
    <div class="info-text">
      <div class="info-title" id="infoTitle">Test Video</div>
      <div class="info-status" id="infoStatus">Connecting...</div>
    </div>
    <div class="cf-badge">CINEFLIX</div>
  </div>
</div>

<script>
  const player = document.getElementById('player');
  const loadingState = document.getElementById('loadingState');
  const errorState = document.getElementById('errorState');
  const statusDot = document.getElementById('statusDot');
  const infoTitle = document.getElementById('infoTitle');
  const infoStatus = document.getElementById('infoStatus');

  // Test video hardcoded for preview
  const TEST_URL = "https://files.catbox.moe/2h56l7.mp4";

  // In real app — URL comes from startapp param
  const params = new URLSearchParams(window.location.search);
  const videoUrl = params.get('url') || params.get('startapp') || TEST_URL;

  player.src = videoUrl;
  player.load();
  player.play().catch(()=>{});

  player.addEventListener('canplay', () => {
    loadingState.classList.add('hidden');
    statusDot.className = 'status-dot';
    infoStatus.textContent = 'Playing ▶';
  });
  player.addEventListener('waiting', () => { infoStatus.textContent = 'Buffering...'; });
  player.addEventListener('pause', () => { statusDot.className = 'status-dot idle'; infoStatus.textContent = 'Paused ⏸'; });
  player.addEventListener('playing', () => { statusDot.className = 'status-dot'; infoStatus.textContent = 'Playing ▶'; });
  player.addEventListener('ended', () => { statusDot.className = 'status-dot idle'; infoStatus.textContent = 'Ended ⏹'; });
  player.addEventListener('error', () => {
    loadingState.classList.add('hidden');
    errorState.classList.add('show');
    statusDot.className = 'status-dot error-dot';
    infoStatus.textContent = 'Stream Failed';
  });
</script>
</body>
</html>
